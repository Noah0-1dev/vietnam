<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>極速打字盲測系統 - Level 3 Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      /* CSS tô màu hiển thị ký tự gõ chuẩn hay gõ lỗi */
      .char-correct {
        color: #10b981;
        border-bottom: 2px solid #10b981;
        font-weight: bold;
      }
      .char-incorrect {
        color: #f43f5e;
        background-color: rgba(244, 63, 94, 0.15);
        border-radius: 4px;
      }
      .char-current {
        border-bottom: 2px solid #06b6d4;
        animation: blink 0.8s infinite;
      }
      @keyframes blink {
        50% {
          border-color: transparent;
        }
      }
    </style>
    <script>
      if (localStorage.getItem("theme_level3") === "dark")
        document.documentElement.classList.add("dark");
    </script>
  </head>
  <body
    class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen p-4 md:p-8 transition-colors duration-300"
  >
    <div class="max-w-4xl mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center text-sm text-cyan-600 dark:text-cyan-400 font-bold mb-6 hover:underline"
        >← 返回主入口總覽</a
      >

      <div
        class="bg-cyan-50/60 dark:bg-cyan-950/20 border border-cyan-200 dark:border-cyan-900 rounded-2xl p-5 mb-6 text-xs md:text-sm text-slate-600 dark:text-slate-300 shadow-xs"
      >
        <span
          class="font-extrabold text-cyan-700 dark:text-cyan-400 block text-base mb-1.5"
          >💡 Level 3 盲測核心控制台</span
        >
        <li>
          支援多範本一鍵渲染與右側「自由輸入自訂練習模塊」。鍵入文字時，系統會驅動物理音頻卡模擬機械式鍵盤清脆敲擊聲。
        </li>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-5 rounded-2xl shadow-sm flex flex-col justify-between"
        >
          <div>
            <label
              for="langSelector"
              class="block text-xs font-bold text-slate-400 font-mono uppercase tracking-wider mb-2"
              >🌐 核心內建文本庫:</label
            >
            <select
              id="langSelector"
              class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 text-sm font-medium focus:outline-none focus:border-cyan-500 text-slate-800 dark:text-slate-200 cursor-pointer"
            >
              <option value="code">JavaScript Code (程式碼)</option>
              <option value="english">English Paragraph (英文經典)</option>
              <option value="asia">中文/越文簡介 (亞洲語系)</option>
            </select>
          </div>
        </div>

        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-5 rounded-2xl shadow-sm"
        >
          <label
            for="customTextInput"
            class="block text-xs font-bold text-slate-400 font-mono uppercase tracking-wider mb-2"
            >✍️ 開放式自由自訂文本:</label
          >
          <div class="flex gap-2">
            <input
              type="text"
              id="customTextInput"
              placeholder="在此貼上任何想練習的自訂文字..."
              class="w-full p-2.5 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 text-sm focus:outline-none focus:border-cyan-500 text-slate-900 dark:text-slate-100"
            />
            <button
              id="applyCustomBtn"
              class="bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 text-white text-xs font-bold px-4 rounded-xl transition-all shrink-0 cursor-pointer"
            >
              套用文本
            </button>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 mb-6">
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl text-center shadow-md"
        >
          <span class="block text-xs text-slate-400 font-mono tracking-wider"
            >TIME LEFT</span
          >
          <span
            id="timeLeft"
            class="text-2xl font-black font-mono text-cyan-600 dark:text-cyan-400"
            >30</span
          ><span class="text-xs text-slate-400 ml-1">s</span>
        </div>
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl text-center shadow-md"
        >
          <span class="block text-xs text-slate-400 font-mono tracking-wider"
            >SPEED (WPM)</span
          >
          <span
            id="wpm"
            class="text-2xl font-black font-mono text-cyan-600 dark:text-cyan-400"
            >0</span
          >
        </div>
        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl text-center shadow-md"
        >
          <span class="block text-xs text-slate-400 font-mono tracking-wider"
            >ACCURACY</span
          >
          <span
            id="accuracy"
            class="text-2xl font-black font-mono text-cyan-600 dark:text-cyan-400"
            >100</span
          ><span class="text-xs text-slate-400 ml-1">%</span>
        </div>
      </div>

      <div
        id="textExample"
        class="bg-slate-100 dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 font-mono text-base md:text-lg tracking-wide leading-relaxed select-none mb-6 whitespace-pre-wrap break-all text-slate-600 dark:text-slate-400 shadow-inner min-h-[120px]"
      ></div>

      <textarea
        id="textInput"
        placeholder="請先點擊下方按鈕解鎖進行測驗..."
        class="w-full h-32 p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-800 text-slate-900 dark:text-slate-100 font-mono focus:outline-none focus:border-cyan-500 transition-all text-sm md:text-base resize-none shadow-md disabled:opacity-50"
        disabled
      ></textarea>

      <div class="mt-4 flex justify-end">
        <button
          id="startTestBtn"
          class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold px-6 py-3 rounded-xl text-sm transition-all shadow-md shadow-cyan-100 dark:shadow-none cursor-pointer"
        >
          開始測驗 / 重新整理
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
