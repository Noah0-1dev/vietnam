<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極速程式碼英打測試</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .char-correct { color: #10b981; border-bottom: 2px solid #10b981; font-weight: bold; }
        .char-incorrect { color: #f43f5e; background-color: rgba(244, 63, 94, 0.2); border-radius: 4px; }
        .char-current { border-bottom: 2px solid #06b6d4; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <a href="../index.html" class="inline-flex items-center text-sm text-cyan-400 hover:text-cyan-300 transition-colors mb-6">← 返回主入口總覽</a>
        
        <div class="bg-cyan-950/40 border border-cyan-500/20 rounded-2xl p-5 mb-8 text-sm text-slate-300 backdrop-blur-md">
            <h4 class="font-bold text-cyan-400 text-base mb-2">💡 新手操作指南 (Quick Start)</h4>
            <ul class="list-disc pl-5 space-y-1 text-xs md:text-sm text-slate-400">
                <li><strong class="text-slate-200">如何開始:</strong> 點擊右下角「開始測驗」按鈕，此時下方輸入框會被啟用，倒數計時 30 秒隨之啟動。</li>
                <li><strong class="text-slate-200">即時校對:</strong> 依據上方黑底區域的程式碼範本進行輸入。打對會顯示綠色，打錯會呈現紅底。系統會即時動態精算您的 WPM 語速速度與精準百分比。</li>
            </ul>
        </div>

        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-slate-900/80 border border-white/5 p-4 rounded-2xl text-center shadow-lg">
                <span class="block text-xs text-slate-500 font-mono uppercase tracking-wider">TIME LEFT</span>
                <span id="timeLeft" class="text-2xl font-black font-mono text-cyan-400">30</span><span class="text-xs text-slate-500 ml-1">s</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-4 rounded-2xl text-center shadow-lg">
                <span class="block text-xs text-slate-500 font-mono uppercase tracking-wider">SPEED (WPM)</span>
                <span id="wpm" class="text-2xl font-black font-mono text-cyan-400">0</span>
            </div>
            <div class="bg-slate-900/80 border border-white/5 p-4 rounded-2xl text-center shadow-lg">
                <span class="block text-xs text-slate-500 font-mono uppercase tracking-wider">ACCURACY</span>
                <span id="accuracy" class="text-2xl font-black font-mono text-cyan-400">100</span><span class="text-xs text-slate-500 ml-1">%</span>
            </div>
        </div>

        <div id="textExample" class="bg-slate-950 p-6 rounded-2xl border border-white/5 font-mono text-base md:text-lg tracking-wide leading-relaxed select-none mb-6 whitespace-pre-wrap break-all shadow-inner text-slate-400"></div>
        <textarea id="textInput" placeholder="請點擊下方按鈕啟動測驗..." class="w-full h-32 p-4 rounded-2xl bg-slate-900/60 border border-white/10 text-white font-mono focus:outline-none focus:border-cyan-500 transition-all text-sm md:text-base resize-none shadow-lg" disabled></textarea>

        <div class="mt-4 flex justify-end">
            <button id="startTestBtn" class="bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold px-6 py-3 rounded-xl text-sm transition-all shadow-md">開始測驗 / 重新整理</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
