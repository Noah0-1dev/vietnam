<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>極速程式碼英打測試</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      .char-correct {
        color: #10b981;
        border-bottom: 2px solid #10b981;
        font-weight: bold;
      }
      .char-incorrect {
        color: #f43f5e;
        background-color: rgba(244, 63, 94, 0.1);
        border-radius: 4px;
      }
      .char-current {
        border-bottom: 2px solid #06b6d4;
        animation: blink 0.8s infinite;
      }
      @keyframes blink {
        50% {
          border-color: transparent;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center text-sm text-cyan-600 hover:text-cyan-700 font-medium transition-colors mb-6"
        >← 返回主入口總覽</a
      >

      <div
        class="bg-cyan-50 border border-cyan-200 rounded-2xl p-5 mb-8 text-sm text-slate-700 shadow-sm"
      >
        <h4 class="font-bold text-cyan-700 text-base mb-2">
          💡 新手操作指南 (Quick Start)
        </h4>
        <ul
          class="list-disc pl-5 space-y-1.5 text-xs md:text-sm text-slate-600"
        >
          <li>
            <strong class="text-slate-900">如何開始：</strong>
            點擊右下角的「開始測驗」按鈕，下方的文字輸入框即會解鎖，此時 30
            秒倒數計時將同步啟動。
          </li>
          <li>
            <strong class="text-slate-900">即時校對：</strong>
            請對照上方灰色框內的程式碼進行輸入。打對的字會顯示為綠色，打錯則會呈現紅底。系統會即時動態精算您的
            WPM 速率與正確率。
          </li>
        </ul>
      </div>

      <div class="grid grid-cols-3 gap-4 mb-6">
        <div
          class="bg-white border border-slate-200 p-4 rounded-2xl text-center shadow-md"
        >
          <span
            class="block text-xs text-slate-400 font-mono uppercase tracking-wider"
            >TIME LEFT</span
          >
          <span
            id="timeLeft"
            class="text-2xl font-black font-mono text-cyan-600"
            >30</span
          ><span class="text-xs text-slate-400 ml-1">s</span>
        </div>
        <div
          class="bg-white border border-slate-200 p-4 rounded-2xl text-center shadow-md"
        >
          <span
            class="block text-xs text-slate-400 font-mono uppercase tracking-wider"
            >SPEED (WPM)</span
          >
          <span id="wpm" class="text-2xl font-black font-mono text-cyan-600"
            >0</span
          >
        </div>
        <div
          class="bg-white border border-slate-200 p-4 rounded-2xl text-center shadow-md"
        >
          <span
            class="block text-xs text-slate-400 font-mono uppercase tracking-wider"
            >ACCURACY</span
          >
          <span
            id="accuracy"
            class="text-2xl font-black font-mono text-cyan-600"
            >100</span
          ><span class="text-xs text-slate-400 ml-1">%</span>
        </div>
      </div>

      <div
        id="textExample"
        class="bg-slate-100 p-6 rounded-2xl border border-slate-200 font-mono text-base md:text-lg tracking-wide leading-relaxed select-none mb-6 whitespace-pre-wrap break-all text-slate-500 shadow-inner"
      ></div>
      <textarea
        id="textInput"
        placeholder="請點擊下方按鈕啟動測驗..."
        class="w-full h-32 p-4 rounded-2xl bg-white border border-slate-300 text-slate-900 font-mono focus:outline-none focus:border-cyan-600 transition-all text-sm md:text-base resize-none shadow-md"
        disabled
      ></textarea>

      <div class="mt-4 flex justify-end">
        <button
          id="startTestBtn"
          class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold px-6 py-3 rounded-xl text-sm transition-all shadow-md"
        >
          開始測驗 / 重新整理
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
