<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 記憶翻牌對對碰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <a href="../index.html" class="inline-flex items-center text-sm text-emerald-400 hover:text-emerald-300 transition-colors mb-6">← 返回主入口總覽</a>
        
        <div class="bg-emerald-950/40 border border-emerald-500/20 rounded-2xl p-5 mb-8 text-sm text-slate-300 backdrop-blur-md">
            <h4 class="font-bold text-emerald-400 text-base mb-2">💡 新手操作指南 (Quick Start)</h4>
            <ul class="list-disc pl-5 space-y-1 text-xs md:text-sm text-slate-400">
                <li><strong class="text-slate-200">核心玩法的:</strong> 畫面上共有 16 張卡牌（隱藏著 8 對相同的動物/昆蟲表情符號）。點擊任意卡牌可將其翻開。</li>
                <li><strong class="text-slate-200">配對規則:</strong> 連續翻開兩張卡牌，若圖案相同則配對成功（卡牌變半透明）；若不同則會在 1 秒後自動翻回背面。用最短時間和最少次數翻開所有配對即獲勝！</li>
            </ul>
        </div>

        <div class="flex justify-between items-center bg-slate-900/80 border border-white/10 p-5 rounded-2xl mb-8 shadow-xl">
            <div class="font-mono text-sm">⏱️ RUNTIME: <span id="timer" class="font-bold text-emerald-400 text-lg ml-1">00:00</span></div>
            <div class="font-mono text-sm">🔄 CLICKS: <span id="clicks" class="font-bold text-emerald-400 text-lg ml-1">0</span></div>
            <button id="restartBtn" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold px-5 py-2 rounded-xl text-xs md:text-sm shadow-md transition-all">重啟對局</button>
        </div>

        <div id="gameBoard" class="grid grid-cols-4 gap-3 md:gap-5 max-w-md mx-auto aspect-square p-2"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
