<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻牌記憶對對碰遊戲</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <a href="../index.html" class="inline-block mb-6 text-sm text-teal-400 hover:underline">← 返回入口總覽</a>
        
        <h2 class="text-2xl md:text-3xl font-bold mb-6 text-teal-400 border-b border-slate-800 pb-4">🃏 翻牌記憶對對碰</h2>

        <div class="flex justify-between items-center bg-slate-800 border border-slate-700 p-4 rounded-xl mb-6 text-sm md:text-base">
            <div>⏱️ 時間: <span id="timer" class="font-mono font-bold text-teal-400">00:00</span></div>
            <div>🔄 點擊次數: <span id="clicks" class="font-mono font-bold text-teal-400">0</span></div>
            <button id="restartBtn" class="bg-teal-500 hover:bg-teal-400 text-slate-950 font-bold px-4 py-1.5 rounded-lg transition-colors text-xs md:text-sm">重新開始</button>
        </div>

        <div id="gameBoard" class="grid grid-cols-4 gap-3 md:gap-4 max-w-md mx-auto aspect-square"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
