<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能畫布 & QR 生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center text-sm text-purple-600 hover:text-purple-700 font-medium transition-colors mb-6"
        >← 返回主入口總覽</a
      >

      <div
        class="bg-purple-50 border border-purple-200 rounded-2xl p-5 mb-8 text-sm text-slate-700 shadow-sm"
      >
        <h4 class="font-bold text-purple-700 text-base mb-2">
          💡 新手操作指南 (Quick Start)
        </h4>
        <ul
          class="list-disc pl-5 space-y-1.5 text-xs md:text-sm text-slate-600"
        >
          <li>
            <strong class="text-slate-900">線上畫布：</strong>
            在白色畫布區域按住滑鼠左鍵（或手機手指觸控）即可隨意塗鴉。下方工具列可以更換顏色與調整線條粗細，完成後點擊「導出畫作」即可儲存為
            PNG 圖片。
          </li>
          <li>
            <strong class="text-slate-900">快速 QR 碼：</strong>
            在右側輸入框內輸入任何網址或文字，點擊按鈕即可一鍵生成二維碼。
          </li>
        </ul>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div
          class="lg:col-span-2 bg-white border border-slate-200 p-6 rounded-3xl shadow-xl flex flex-col items-center"
        >
          <h3
            class="text-xl font-bold mb-4 self-start text-slate-900 flex items-center gap-2"
          >
            <span>🎨</span> 線上數位繪圖板
          </h3>
          <canvas
            id="paintCanvas"
            width="650"
            height="400"
            class="bg-white rounded-2xl w-full shadow-inner border border-slate-300 cursor-crosshair touch-none"
          ></canvas>

          <div
            class="flex flex-wrap gap-4 mt-6 items-center justify-center w-full bg-slate-50 p-4 rounded-xl border border-slate-200"
          >
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-500 font-mono">COLOR:</span>
              <input
                type="color"
                id="colorPicker"
                value="#7c3aed"
                class="w-8 h-8 rounded-lg cursor-pointer bg-transparent border-0"
              />
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-500 font-mono">SIZE:</span>
              <input
                type="range"
                id="lineWidth"
                min="1"
                max="25"
                value="6"
                class="accent-purple-600"
              />
            </div>
            <div class="flex gap-2 ml-auto">
              <button
                id="clearBtn"
                class="bg-slate-200 hover:bg-rose-100 text-rose-600 px-4 py-2 text-xs font-bold rounded-xl transition-all"
              >
                清空重來
              </button>
              <button
                id="downloadBtn"
                class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 text-xs font-bold rounded-xl transition-all shadow-md"
              >
                導出畫作
              </button>
            </div>
          </div>
        </div>

        <div
          class="bg-white border border-slate-200 p-6 rounded-3xl shadow-xl flex flex-col justify-between"
        >
          <div>
            <h3
              class="text-xl font-bold mb-4 text-slate-900 flex items-center gap-2"
            >
              <span>✨</span> 快速 QR 碼轉換
            </h3>
            <input
              type="text"
              id="qrInput"
              placeholder="請輸入網址 URL..."
              class="w-full p-3.5 rounded-xl bg-slate-50 border border-slate-300 text-slate-900 text-sm focus:outline-none focus:border-purple-600 transition-colors"
            />
            <button
              id="genQrBtn"
              class="w-full mt-4 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl text-sm shadow-md transition-all"
            >
              生成二維條碼
            </button>
          </div>

          <div
            class="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl p-4 my-6 min-h-52 bg-slate-50"
          >
            <div
              id="qrcode"
              class="p-3 bg-white rounded-xl shadow-md hidden"
            ></div>
            <p id="qrPlaceholder" class="text-slate-400 text-xs font-light">
              等待輸入中...
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
