<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能畫布 & QR 核心系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      if (localStorage.getItem("theme_level3") === "dark")
        document.documentElement.classList.add("dark");
    </script>
  </head>
  <body
    class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 min-h-screen p-4 md:p-8 transition-colors duration-300"
  >
    <div class="max-w-6xl mx-auto">
      <a
        href="../index.html"
        class="inline-flex items-center text-sm text-purple-600 dark:text-purple-400 font-bold mb-6 hover:underline"
        >← 返回主入口總覽</a
      >

      <div
        class="bg-purple-50/60 dark:bg-purple-950/20 border border-purple-200 dark:border-purple-900 rounded-2xl p-5 mb-8 text-xs md:text-sm text-slate-600 dark:text-slate-300 shadow-xs"
      >
        <span
          class="font-extrabold text-purple-700 dark:text-purple-400 block text-base mb-1.5"
          >💡繪圖與二維碼系統指南</span
        >
        <li>
          使用滑鼠或移動設備觸控可在畫布上任意作畫，下方工具列可自由切換飽和度色彩與調整筆跡線徑。
        </li>
        <li>
          在右側文字槽輸入 URL 後，系統除了即時編碼生成 QR
          Code，還為您解鎖了本地圖檔導出按鈕。
        </li>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div
          class="lg:col-span-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-xl flex flex-col items-center"
        >
          <h3 class="text-lg font-bold mb-4 self-start flex items-center gap-2">
            <span>🎨</span> 線上數位繪圖板 Base
          </h3>
          <canvas
            id="paintCanvas"
            width="650"
            height="400"
            class="bg-white rounded-2xl w-full shadow-inner border border-slate-200 dark:border-slate-700 cursor-crosshair touch-none"
          ></canvas>

          <div
            class="flex flex-wrap gap-4 mt-6 items-center justify-center w-full bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-slate-200 dark:border-slate-800"
          >
            <div class="flex items-center gap-2">
              <span class="text-xs font-mono text-slate-400">COLOR:</span>
              <input
                type="color"
                id="colorPicker"
                value="#7c3aed"
                class="w-8 h-8 rounded-lg cursor-pointer bg-transparent border-0"
              />
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs font-mono text-slate-400">THICKNESS:</span>
              <input
                type="range"
                id="lineWidth"
                min="1"
                max="25"
                value="6"
                class="accent-purple-600"
              />
            </div>
            <div class="flex gap-2 ml-auto">
              <button
                id="clearBtn"
                class="bg-rose-50 dark:bg-rose-950/40 text-rose-600 dark:text-rose-400 px-4 py-2 text-xs font-bold rounded-xl hover:bg-rose-100 transition-all"
              >
                清空畫布
              </button>
              <button
                id="downloadBtn"
                class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 text-xs font-bold rounded-xl transition-all shadow-md"
              >
                導出畫作 PNG
              </button>
            </div>
          </div>
        </div>

        <div
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-xl flex flex-col justify-between"
        >
          <div>
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
              <span>✨</span> 智慧快碼轉換核心
            </h3>
            <input
              type="text"
              id="qrInput"
              placeholder="請輸入網址或常規字串..."
              class="w-full p-3.5 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 text-sm focus:outline-none focus:border-purple-500 text-slate-900 dark:text-slate-100"
            />
            <button
              id="genQrBtn"
              class="w-full mt-4 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl text-sm shadow-md transition-all cursor-pointer"
            >
              矩陣邊碼化
            </button>
          </div>

          <div
            class="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl p-4 my-6 min-h-56 bg-slate-50 dark:bg-slate-950"
          >
            <div
              id="qrcode"
              class="p-3 bg-white rounded-xl shadow-md hidden"
            ></div>
            <p id="qrPlaceholder" class="text-slate-400 text-xs font-light">
              Awaiting Data Input...
            </p>
            <button
              id="downloadQrBtn"
              class="mt-4 bg-slate-800 dark:bg-slate-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition-all hidden cursor-pointer"
            >
              💾 下載二維碼圖片
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
